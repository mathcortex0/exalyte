
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Results — ExamForge</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --surface2: #1c1c26;
    --border: #2a2a3a;
    --gold: #f0c040;
    --gold2: #ffd966;
    --text: #e8e8f0;
    --muted: #666680;
    --error: #ff5566;
    --success: #44cc88;
    --radius: 10px;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Instrument Sans',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }

  nav {
    background:var(--surface);
    border-bottom:1px solid var(--border);
    padding:0 32px;
    height:60px;
    display:flex;
    align-items:center;
    justify-content:space-between;
  }
  .brand { font-family:'Syne',sans-serif; font-weight:800; font-size:1.1rem; }
  .btn-back {
    padding:8px 18px;
    background:transparent;
    border:1px solid var(--border);
    color:var(--muted);
    border-radius:var(--radius);
    font-family:'Syne',sans-serif;
    font-size:0.82rem;
    font-weight:600;
    cursor:pointer;
    text-decoration:none;
    transition:all .2s;
  }
  .btn-back:hover { border-color:var(--gold); color:var(--gold); }

  .main { max-width:860px; margin:0 auto; padding:40px 24px; }

  /* SCORE HERO */
  .score-hero {
    text-align:center;
    padding:48px 24px;
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:16px;
    margin-bottom:32px;
    position:relative;
    overflow:hidden;
  }
  .score-hero::before {
    content:'';
    position:absolute; inset:0;
    background:radial-gradient(ellipse 60% 60% at 50% 0%, rgba(240,192,64,0.08) 0%, transparent 70%);
    pointer-events:none;
  }
  .score-label { font-size:0.75rem; text-transform:uppercase; letter-spacing:.1em; color:var(--muted); font-weight:600; margin-bottom:12px; }
  .score-big {
    font-family:'Syne',sans-serif;
    font-size:clamp(3rem,10vw,5rem);
    font-weight:800;
    line-height:1;
    margin-bottom:8px;
  }
  .score-big.pass { color:var(--success); }
  .score-big.fail { color:var(--error); }
  .score-big.mid { color:var(--gold); }
  .score-fraction { font-family:'Syne',sans-serif; font-size:1.1rem; color:var(--muted); margin-bottom:16px; }
  .score-msg { font-size:0.95rem; color:var(--muted); }

  .score-stats { display:flex; justify-content:center; gap:32px; margin-top:24px; flex-wrap:wrap; }
  .score-stat { text-align:center; }
  .score-stat-val { font-family:'Syne',sans-serif; font-size:1.4rem; font-weight:700; }
  .score-stat-label { font-size:0.72rem; text-transform:uppercase; letter-spacing:.07em; color:var(--muted); margin-top:2px; }

  /* REVIEW */
  .section-title {
    font-family:'Syne',sans-serif;
    font-size:0.85rem;
    font-weight:700;
    text-transform:uppercase;
    letter-spacing:.06em;
    color:var(--muted);
    margin-bottom:16px;
  }

  .review-list { display:flex; flex-direction:column; gap:14px; }
  .review-item {
    background:var(--surface);
    border:1.5px solid var(--border);
    border-radius:var(--radius);
    overflow:hidden;
  }
  .review-item.correct { border-color:rgba(68,204,136,0.3); }
  .review-item.wrong { border-color:rgba(255,85,102,0.3); }

  .review-header {
    padding:14px 18px;
    display:flex;
    align-items:flex-start;
    gap:12px;
  }
  .review-num {
    width:26px; height:26px;
    border-radius:6px;
    display:flex; align-items:center; justify-content:center;
    font-family:'Syne',sans-serif;
    font-size:0.75rem;
    font-weight:700;
    flex-shrink:0;
  }
  .correct .review-num { background:rgba(68,204,136,0.15); color:var(--success); }
  .wrong .review-num { background:rgba(255,85,102,0.15); color:var(--error); }
  .skipped .review-num { background:var(--surface2); color:var(--muted); }
  .review-q { font-size:0.9rem; line-height:1.5; }
  .review-status { margin-left:auto; font-size:0.78rem; font-weight:600; padding:2px 10px; border-radius:20px; flex-shrink:0; }
  .correct .review-status { background:rgba(68,204,136,0.1); color:var(--success); }
  .wrong .review-status { background:rgba(255,85,102,0.1); color:var(--error); }
  .skipped .review-status { background:var(--surface2); color:var(--muted); }

  .review-answers {
    padding:12px 18px;
    background:var(--surface2);
    border-top:1px solid var(--border);
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:8px;
  }
  .ans-item { font-size:0.8rem; display:flex; align-items:center; gap:6px; }
  .ans-label { color:var(--muted); }
  .ans-val { font-weight:600; }
  .ans-val.correct-val { color:var(--success); }
  .ans-val.wrong-val { color:var(--error); }

  .loading { text-align:center; padding:80px; color:var(--muted); }
  .spinner { width:32px; height:32px; border:2px solid var(--border); border-top-color:var(--gold); border-radius:50%; animation:spin .7s linear infinite; margin:0 auto 14px; }
  @keyframes spin { to { transform:rotate(360deg); } }

  @media(max-width:600px) {
    .review-answers { grid-template-columns:1fr; }
    nav { padding:0 16px; }
  }
</style>
</head>
<body>

<nav>
  <div class="brand">ExamForge</div>
  <a href="/dashboard.html" class="btn-back">← Back to Dashboard</a>
</nav>

<div class="main">
  <div id="app">
    <div class="loading"><div class="spinner"></div>Loading results...</div>
  </div>
</div>

<script>
const token = localStorage.getItem('token');
if (!token) { window.location.href = '/'; }

const params = new URLSearchParams(location.search);
const attemptId = params.get('attempt');
const examId = params.get('exam');

async function loadResult() {
  try {
    const res = await fetch(`/api/exams/${examId}/result/${attemptId}`, {
      headers:{ Authorization:`Bearer ${token}` }
    });
    const data = await res.json();
    if (data.error) { document.getElementById('app').innerHTML = `<p style="color:var(--error)">${data.error}</p>`; return; }
    render(data);
  } catch(e) {
    document.getElementById('app').innerHTML = `<div class="loading">Failed to load results.</div>`;
  }
}

function render({ attempt, exam, questions }) {
  const { score, total_questions, percentage, answers } = attempt;
  const scoreClass = percentage >= 80 ? 'pass' : percentage >= 50 ? 'mid' : 'fail';
  const msg = percentage >= 80 ? '🎉 Excellent work!' : percentage >= 50 ? '👍 Good effort!' : '💪 Keep practicing!';

  const correct = score;
  const wrong = Object.values(answers).filter(a => !a.isCorrect && a.given).length;
  const skipped = total_questions - correct - wrong;

  document.title = `${exam.name} Results — ExamForge`;

  const reviewItems = questions.map((q, i) => {
    const ans = answers[q.id] || { given: '', correct: '', isCorrect: false };
    const isSkipped = !ans.given;
    const cls = isSkipped ? 'skipped' : (ans.isCorrect ? 'correct' : 'wrong');
    const statusText = isSkipped ? 'Skipped' : (ans.isCorrect ? '✓ Correct' : '✗ Wrong');

    const optMap = { A: q.option_a, B: q.option_b, C: q.option_c, D: q.option_d };

    return `
      <div class="review-item ${cls}">
        <div class="review-header">
          <div class="review-num">${i+1}</div>
          <div class="review-q">${esc(q.question_text)}</div>
          <span class="review-status">${statusText}</span>
        </div>
        <div class="review-answers">
          <div class="ans-item">
            <span class="ans-label">Your answer:</span>
            <span class="ans-val ${!isSkipped && !ans.isCorrect ? 'wrong-val' : isSkipped ? '' : 'correct-val'}">
              ${ans.given ? `${ans.given}. ${esc(optMap[ans.given] || '')}` : '—'}
            </span>
          </div>
          <div class="ans-item">
            <span class="ans-label">Correct answer:</span>
            <span class="ans-val correct-val">${ans.correct}. ${esc(optMap[ans.correct] || '')}</span>
          </div>
        </div>
      </div>`;
  }).join('');

  document.getElementById('app').innerHTML = `
    <div class="score-hero">
      <div class="score-label">${esc(exam.name)} · Final Score</div>
      <div class="score-big ${scoreClass}">${percentage}%</div>
      <div class="score-fraction">${score} out of ${total_questions} correct</div>
      <div class="score-msg">${msg}</div>
      <div class="score-stats">
        <div class="score-stat">
          <div class="score-stat-val" style="color:var(--success)">${correct}</div>
          <div class="score-stat-label">Correct</div>
        </div>
        <div class="score-stat">
          <div class="score-stat-val" style="color:var(--error)">${wrong}</div>
          <div class="score-stat-label">Wrong</div>
        </div>
        <div class="score-stat">
          <div class="score-stat-val" style="color:var(--muted)">${skipped}</div>
          <div class="score-stat-label">Skipped</div>
        </div>
      </div>
    </div>

    <div class="section-title">Answer Review</div>
    <div class="review-list">${reviewItems}</div>
  `;
}

function esc(s) { const d=document.createElement('div'); d.textContent=String(s||''); return d.innerHTML; }

loadResult();
</script>
</body>
</html>
