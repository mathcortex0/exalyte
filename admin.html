<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: system-ui, -apple-system, sans-serif; background: #f5f5f5; }
        .header { background: #1a1a2e; color: white; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; }
        .logo span { color: #e67e22; }
        .btn { padding: 0.5rem 1rem; border-radius: 8px; border: none; cursor: pointer; text-decoration: none; display: inline-block; }
        .btn-outline { background: transparent; border: 1px solid #e67e22; color: #e67e22; }
        .btn-primary { background: #e67e22; color: white; }
        .btn-danger { background: #e74c3c; color: white; }
        .container { max-width: 1400px; margin: 0 auto; padding: 2rem; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem; margin-bottom: 2rem; }
        .stat-card { background: white; padding: 1.5rem; border-radius: 12px; text-align: center; }
        .stat-number { font-size: 2rem; font-weight: bold; color: #e67e22; }
        .nav-tabs { display: flex; gap: 0.5rem; margin-bottom: 2rem; flex-wrap: wrap; }
        .nav-tab { padding: 0.75rem 1.5rem; background: white; border: 1px solid #ddd; cursor: pointer; }
        .nav-tab.active { background: #e67e22; color: white; }
        .panel { display: none; }
        .panel.active { display: block; }
        table { width: 100%; background: white; border-radius: 12px; overflow: hidden; }
        th, td { padding: 1rem; text-align: left; border-bottom: 1px solid #eee; }
        th { background: #f8f9fa; }
        .modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 2rem; border-radius: 16px; max-width: 600px; width: 90%; max-height: 80vh; overflow-y: auto; }
        .form-group { margin-bottom: 1rem; }
        .form-group label { display: block; margin-bottom: 0.5rem; font-weight: 500; }
        .form-group input, .form-group textarea, .form-group select { width: 100%; padding: 0.75rem; border: 1px solid #ddd; border-radius: 8px; }
        textarea { min-height: 150px; }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">Admin <span>Dashboard</span></div>
        <div><span id="adminEmail"></span> <button onclick="logout()" class="btn btn-outline">Logout</button> <a href="index.html" class="btn btn-outline">Site</a></div>
    </div>

    <div class="container">
        <div class="stats-grid" id="statsGrid"></div>
        <div class="nav-tabs">
            <div class="nav-tab active" onclick="switchPanel('articles')">Articles</div>
            <div class="nav-tab" onclick="switchPanel('users')">Users</div>
            <div class="nav-tab" onclick="switchPanel('subscriptions')">Subscriptions</div>
        </div>
        <div id="articlesPanel" class="panel active"><button class="btn btn-primary" onclick="openArticleModal()">+ New Article</button><br><br><div id="articlesTable"></div></div>
        <div id="usersPanel" class="panel"><div id="usersTable"></div></div>
        <div id="subscriptionsPanel" class="panel"><button class="btn btn-primary" onclick="openSubscriptionModal()">+ Add Subscription</button><br><br><div id="subscriptionsTable"></div></div>
    </div>

    <div id="articleModal" class="modal"><div class="modal-content"><h2 id="modalTitle">Article</h2>
        <div class="form-group"><label>Title</label><input type="text" id="articleTitle"></div>
        <div class="form-group"><label>Slug</label><input type="text" id="articleSlug"></div>
        <div class="form-group"><label>Excerpt</label><textarea id="articleExcerpt" rows="2"></textarea></div>
        <div class="form-group"><label>Content (HTML)</label><textarea id="articleContent" rows="8"></textarea></div>
        <div class="form-group"><label>Image URL</label><input type="text" id="articleImageUrl"><button class="btn btn-outline" onclick="uploadImage()">Upload Image</button><input type="file" id="imageFile" style="display:none"></div>
        <div class="form-group"><label><input type="checkbox" id="articleIsFree"> Free Article</label></div>
        <div class="form-group"><label><input type="checkbox" id="articleIsPublished"> Published</label></div>
        <button class="btn btn-primary" onclick="saveArticle()">Save</button><button class="btn btn-outline" onclick="closeModal('articleModal')">Cancel</button>
    </div></div>

    <div id="subscriptionModal" class="modal"><div class="modal-content"><h2>Add Subscription</h2>
        <div class="form-group"><label>User ID</label><input type="text" id="subUserId" placeholder="User UUID from Supabase"></div>
        <div class="form-group"><label>Plan</label><select id="subPlan"><option value="monthly">Monthly (100 BDT)</option><option value="yearly">Yearly (1000 BDT)</option></select></div>
        <div class="form-group"><label>Amount</label><input type="number" id="subAmount" value="100"></div>
        <div class="form-group"><label>Status</label><select id="subStatus"><option value="active">Active</option><option value="pending">Pending</option><option value="expired">Expired</option></select></div>
        <div class="form-group"><label>End Date</label><input type="date" id="subEndDate"></div>
        <div class="form-group"><label>Notes</label><textarea id="subNotes" rows="2"></textarea></div>
        <button class="btn btn-primary" onclick="saveSubscription()">Save</button><button class="btn btn-outline" onclick="closeModal('subscriptionModal')">Cancel</button>
    </div></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://noekogokjjptosipfile.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_TQRMwY2EqtZgAoyMqcSrlw_2TxPE7Lk';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        let token = null;
        let editingArticleId = null;

        async function checkAdmin() {
            const { data: { user } } = await supabase.auth.getUser();
            if (!user) { window.location.href = 'login.html'; return; }
            
            const session = await supabase.auth.getSession();
            token = session.data.session?.access_token;
            
            const res = await fetch('/api/auth/profile', { headers: { 'Authorization': `Bearer ${token}` } });
            const userData = await res.json();
            
            if (userData.role !== 'admin') { alert('Admin only'); window.location.href = 'index.html'; return; }
            
            document.getElementById('adminEmail').innerHTML = user.email;
            loadStats(); loadArticles(); loadUsers(); loadSubscriptions();
        }
        
        async function loadStats() {
            const res = await fetch('/api/admin/stats', { headers: { 'Authorization': `Bearer ${token}` } });
            const stats = await res.json();
            document.getElementById('statsGrid').innerHTML = `
                <div class="stat-card"><div class="stat-number">${stats.total_articles}</div><div>Articles</div></div>
                <div class="stat-card"><div class="stat-number">${stats.published_articles}</div><div>Published</div></div>
                <div class="stat-card"><div class="stat-number">${stats.total_users}</div><div>Users</div></div>
                <div class="stat-card"><div class="stat-number">${stats.active_subscriptions}</div><div>Active Subs</div></div>
            `;
        }
        
        async function loadArticles() {
            const res = await fetch('/api/admin/articles', { headers: { 'Authorization': `Bearer ${token}` } });
            const articles = await res.json();
            document.getElementById('articlesTable').innerHTML = `<table><thead><tr><th>Title</th><th>Type</th><th>Status</th><th>Actions</th></tr></thead><tbody>${articles.map(a => `<tr><td>${a.title}</td><td>${a.is_free ? 'Free' : 'Premium'}</td><td>${a.is_published ? 'Published' : 'Draft'}</td><td><button class="btn btn-outline" onclick="editArticle(${a.id})">Edit</button> <button class="btn btn-danger" onclick="deleteArticle(${a.id})">Del</button></td></tr>`).join('')}</tbody></table>`;
        }
        
        async function loadUsers() {
            const res = await fetch('/api/admin/users', { headers: { 'Authorization': `Bearer ${token}` } });
            const users = await res.json();
            document.getElementById('usersTable').innerHTML = `<table><thead><tr><th>User ID</th><th>Name</th><th>Role</th><th>Premium</th><th>Actions</th></tr></thead><tbody>${users.map(u => `<tr><td>${u.user_id.substring(0,8)}...</td><td>${u.full_name || 'N/A'}</td><td>${u.role}</td><td>${u.is_premium ? 'Yes' : 'No'}</td><td>${u.role !== 'admin' ? `<button class="btn btn-primary" onclick="makeAdmin('${u.user_id}')">Make Admin</button>` : 'Admin'}</td></tr>`).join('')}</tbody></table>`;
        }
        
        async function loadSubscriptions() {
            const res = await fetch('/api/admin/subscriptions', { headers: { 'Authorization': `Bearer ${token}` } });
            const subs = await res.json();
            document.getElementById('subscriptionsTable').innerHTML = `<table><thead><tr><th>User</th><th>Plan</th><th>Amount</th><th>Status</th><th>Actions</th></tr></thead><tbody>${subs.map(s => `<tr><td>${s.full_name || s.user_id.substring(0,8)}</td><td>${s.plan}</td><td>${s.amount} BDT</td><td>${s.status}</td><td><button class="btn btn-primary" onclick="activateSub(${s.id})">Activate</button> <button class="btn btn-danger" onclick="deleteSub(${s.id})">Del</button></td></tr>`).join('')}</tbody></table>`;
        }
        
        async function makeAdmin(userId) {
            await fetch('/api/admin/make-admin', { method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` }, body: JSON.stringify({ user_id: userId }) });
            loadUsers();
        }
        
        async function activateSub(id) {
            await fetch('/api/admin/subscriptions', { method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` }, body: JSON.stringify({ id, status: 'active' }) });
            loadSubscriptions();
        }
        
        async function deleteSub(id) {
            if (confirm('Delete?')) await fetch(`/api/admin/subscriptions/${id}`, { method: 'DELETE', headers: { 'Authorization': `Bearer ${token}` } });
            loadSubscriptions();
        }
        
        async function uploadImage() {
            const input = document.createElement('input'); input.type = 'file'; input.accept = 'image/*';
            input.onchange = async (e) => {
                const formData = new FormData(); formData.append('image', e.target.files[0]);
                const res = await fetch('/api/upload', { method: 'POST', body: formData });
                const data = await res.json();
                if (data.url) document.getElementById('articleImageUrl').value = data.url;
            }; input.click();
        }
        
        function openArticleModal(article=null) {
            editingArticleId = article?.id || null;
            document.getElementById('modalTitle').innerText = article ? 'Edit Article' : 'New Article';
            document.getElementById('articleTitle').value = article?.title || '';
            document.getElementById('articleSlug').value = article?.slug || '';
            document.getElementById('articleExcerpt').value = article?.excerpt || '';
            document.getElementById('articleContent').value = article?.content || '';
            document.getElementById('articleImageUrl').value = article?.image_url || '';
            document.getElementById('articleIsFree').checked = article?.is_free ?? true;
            document.getElementById('articleIsPublished').checked = article?.is_published ?? false;
            document.getElementById('articleModal').style.display = 'flex';
        }
        
        function editArticle(id) { fetch(`/api/admin/articles`, { headers: { 'Authorization': `Bearer ${token}` } }).then(r=>r.json()).then(articles=>openArticleModal(articles.find(a=>a.id==id))); }
        
        async function saveArticle() {
            const data = { id: editingArticleId, title: document.getElementById('articleTitle').value, slug: document.getElementById('articleSlug').value, content: document.getElementById('articleContent').value, excerpt: document.getElementById('articleExcerpt').value, image_url: document.getElementById('articleImageUrl').value, is_free: document.getElementById('articleIsFree').checked, is_published: document.getElementById('articleIsPublished').checked };
            await fetch('/api/admin/articles', { method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` }, body: JSON.stringify(data) });
            closeModal('articleModal'); loadArticles(); loadStats();
        }
        
        async function deleteArticle(id) { if (confirm('Delete?')) await fetch(`/api/admin/articles/${id}`, { method: 'DELETE', headers: { 'Authorization': `Bearer ${token}` } }); loadArticles(); loadStats(); }
        
        function openSubscriptionModal() { document.getElementById('subscriptionModal').style.display = 'flex'; }
        
        async function saveSubscription() {
            const data = { user_id: document.getElementById('subUserId').value, plan: document.getElementById('subPlan').value, amount: parseInt(document.getElementById('subAmount').value), status: document.getElementById('subStatus').value, end_date: document.getElementById('subEndDate').value, notes: document.getElementById('subNotes').value };
            await fetch('/api/admin/subscriptions', { method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` }, body: JSON.stringify(data) });
            closeModal('subscriptionModal'); loadSubscriptions(); loadStats();
        }
        
        function switchPanel(panel) { document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active')); document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active')); document.getElementById(`${panel}Panel`).classList.add('active'); event.target.classList.add('active'); }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
        async function logout() { await supabase.auth.signOut(); window.location.href = 'index.html'; }
        
        checkAdmin();
    </script>
</body>
</html>
