<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin</title>
    <style>
        body { font-family: system-ui; padding: 20px; }
        input, textarea { width: 100%; padding: 10px; margin: 5px 0; border: 1px solid #ddd; border-radius: 8px; }
        button { background: #e67e22; color: white; padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; margin: 5px; }
        .card { background: white; padding: 20px; margin: 10px 0; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
    </style>
</head>
<body>
    <h1>Admin Panel</h1>
    
    <div class="card">
        <h3>Create New Exam</h3>
        <input type="text" id="examName" placeholder="Exam Name">
        <textarea id="examDesc" placeholder="Description"></textarea>
        <input type="number" id="examTime" placeholder="Time Limit (seconds)" value="1800">
        <label><input type="checkbox" id="examPremium"> Premium Exam</label>
        <button onclick="createExam()">Create Exam</button>
    </div>
    
    <div class="card">
        <h3>Upload Questions (CSV)</h3>
        <p>Format: question,option_a,option_b,option_c,option_d,correct,image_url</p>
        <select id="examSelect"></select>
        <input type="file" id="csvFile" accept=".csv">
        <button onclick="uploadCSV()">Upload</button>
    </div>
    
    <div class="card">
        <h3>All Exams</h3>
        <div id="examsList"></div>
    </div>

    <script>
        const user = JSON.parse(localStorage.getItem('user'));
        if (!user || !user.is_admin) window.location.href = 'index.html';
        
        async function loadExams() {
            const res = await fetch('/api/exams');
            const exams = await res.json();
            
            const select = document.getElementById('examSelect');
            select.innerHTML = '<option value="">Select Exam</option>' + 
                exams.map(e => `<option value="${e.id}">${e.name}</option>`).join('');
            
            document.getElementById('examsList').innerHTML = exams.map(e => `
                <div style="border:1px solid #ddd; padding:10px; margin:5px 0;">
                    <strong>${e.name}</strong> - ${e.is_premium ? 'Premium' : 'Free'}
                    <button onclick="deleteExam(${e.id})">Delete</button>
                </div>
            `).join('');
        }
        
        async function createExam() {
            const name = document.getElementById('examName').value;
            const description = document.getElementById('examDesc').value;
            const time_limit = parseInt(document.getElementById('examTime').value);
            const is_premium = document.getElementById('examPremium').checked ? 1 : 0;
            
            const res = await fetch('/api/admin/exam', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, description, time_limit, is_premium })
            });
            
            const data = await res.json();
            if (data.success) {
                alert('Exam created!');
                loadExams();
            }
        }
        
        async function uploadCSV() {
            const examId = document.getElementById('examSelect').value;
            const file = document.getElementById('csvFile').files[0];
            
            if (!examId || !file) {
                alert('Select exam and CSV file');
                return;
            }
            
            const formData = new FormData();
            formData.append('exam_id', examId);
            formData.append('csv_file', file);
            
            const res = await fetch('/api/admin/upload-csv', {
                method: 'POST',
                body: formData
            });
            
            const data = await res.json();
            alert(`${data.inserted} questions uploaded!`);
        }
        
        async function deleteExam(id) {
            if (confirm('Delete this exam?')) {
                await fetch(`/api/admin/exam/${id}`, { method: 'DELETE' });
                loadExams();
            }
        }
        
        loadExams();
    </script>
</body>
</html>
