<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Exalyte - Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">

  <!-- Header -->
  <header class="flex items-center justify-between p-4 bg-white shadow-md sticky top-0 z-10">
    <div class="flex items-center">
      <img src="assets/logo.png" alt="Exalyte Logo" class="h-12 w-auto mr-3">
      <h1 class="text-2xl font-bold text-gray-800">Exalyte</h1>
    </div>
    <button id="logoutBtn" class="bg-red-600 text-white px-4 py-2 rounded hover:bg-red-700">Logout</button>
  </header>

  <!-- Main Dashboard -->
  <main class="p-6">
    <h2 class="text-xl font-semibold mb-4">Available Exams</h2>
    <div id="examList" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
      <!-- Exams will load dynamically here -->
    </div>
  </main>

  <script src="js/dashboard.js"></script>
</body>
</html>
