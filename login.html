<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - English Learning Lab</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: system-ui, -apple-system, sans-serif; background: #f5f5f5; min-height: 100vh; display: flex; justify-content: center; align-items: center; }
        .header { background: #1a1a2e; color: white; padding: 1rem 2rem; position: fixed; top: 0; left: 0; right: 0; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 1.5rem; font-weight: bold; }
        .logo span { color: #e67e22; }
        .btn-outline { background: transparent; border: 1px solid #e67e22; color: #e67e22; padding: 0.5rem 1.5rem; border-radius: 8px; text-decoration: none; }
        .container { max-width: 450px; width: 90%; margin-top: 100px; }
        .card { background: white; border-radius: 16px; padding: 2rem; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        .tabs { display: flex; gap: 1rem; margin-bottom: 2rem; border-bottom: 2px solid #eee; }
        .tab { padding: 0.75rem 1.5rem; cursor: pointer; border: none; background: none; font-size: 1rem; font-weight: 500; }
        .tab.active { color: #e67e22; border-bottom: 2px solid #e67e22; margin-bottom: -2px; }
        .form-group { margin-bottom: 1.5rem; }
        label { display: block; margin-bottom: 0.5rem; font-weight: 500; }
        input { width: 100%; padding: 0.75rem; border: 1px solid #ddd; border-radius: 8px; font-size: 1rem; }
        .btn-primary { width: 100%; background: #e67e22; color: white; border: none; padding: 0.75rem; border-radius: 8px; font-size: 1rem; cursor: pointer; }
        .error { color: red; font-size: 0.85rem; margin-top: 0.5rem; }
        .success { color: green; font-size: 0.85rem; margin-top: 0.5rem; }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">English <span>Learning Lab</span></div>
        <a href="index.html" class="btn-outline">Home</a>
    </div>

    <div class="container">
        <div class="card">
            <div class="tabs">
                <button class="tab active" onclick="switchTab('login')">Sign In</button>
                <button class="tab" onclick="switchTab('signup')">Sign Up</button>
            </div>
            
            <div id="loginForm">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="loginEmail" placeholder="your@email.com">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="loginPassword" placeholder="••••••">
                </div>
                <button class="btn-primary" onclick="signIn()">Sign In</button>
                <div id="loginError" class="error"></div>
            </div>
            
            <div id="signupForm" style="display: none;">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="signupName" placeholder="John Doe">
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="signupEmail" placeholder="your@email.com">
                </div>
                <div class="form-group">
                    <label>Password (min 6 characters)</label>
                    <input type="password" id="signupPassword" placeholder="••••••">
                </div>
                <button class="btn-primary" onclick="signUp()">Create Account</button>
                <div id="signupError" class="error"></div>
                <div id="signupSuccess" class="success"></div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://noekogokjjptosipfile.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_TQRMwY2EqtZgAoyMqcSrlw_2TxPE7Lk';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        function switchTab(tab) {
            const loginForm = document.getElementById('loginForm');
            const signupForm = document.getElementById('signupForm');
            const tabs = document.querySelectorAll('.tab');
            
            if (tab === 'login') {
                loginForm.style.display = 'block';
                signupForm.style.display = 'none';
                tabs[0].classList.add('active');
                tabs[1].classList.remove('active');
            } else {
                loginForm.style.display = 'none';
                signupForm.style.display = 'block';
                tabs[0].classList.remove('active');
                tabs[1].classList.add('active');
            }
        }

        async function signIn() {
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            const errorDiv = document.getElementById('loginError');
            
            errorDiv.textContent = '';
            
            const { data, error } = await supabase.auth.signInWithPassword({ email, password });
            
            if (error) {
                errorDiv.textContent = error.message;
            } else {
                window.location.href = 'index.html';
            }
        }

        async function signUp() {
            const fullName = document.getElementById('signupName').value;
            const email = document.getElementById('signupEmail').value;
            const password = document.getElementById('signupPassword').value;
            const errorDiv = document.getElementById('signupError');
            const successDiv = document.getElementById('signupSuccess');
            
            errorDiv.textContent = '';
            successDiv.textContent = '';
            
            if (password.length < 6) {
                errorDiv.textContent = 'Password must be at least 6 characters';
                return;
            }
            
            const { data, error } = await supabase.auth.signUp({ email, password });
            
            if (error) {
                errorDiv.textContent = error.message;
            } else if (data.user) {
                // Sync user with D1
                await fetch('/api/auth/sync', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        user_id: data.user.id,
                        email: email,
                        full_name: fullName
                    })
                });
                
                successDiv.textContent = 'Account created! Please sign in.';
                setTimeout(() => switchTab('login'), 2000);
            }
        }
    </script>
</body>
</html>
