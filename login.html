<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Exam System</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: system-ui, sans-serif; background: #f0f2f5; min-height: 100vh; display: flex; justify-content: center; align-items: center; }
        .header { background: #1a1a2e; color: white; padding: 1rem 2rem; position: fixed; top: 0; left: 0; right: 0; display: flex; justify-content: space-between; }
        .logo span { color: #e67e22; }
        .btn-outline { background: transparent; border: 1px solid #e67e22; color: #e67e22; padding: 0.5rem 1rem; border-radius: 8px; text-decoration: none; }
        .container { max-width: 450px; width: 90%; margin-top: 100px; }
        .card { background: white; border-radius: 16px; padding: 2rem; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        .tabs { display: flex; gap: 1rem; margin-bottom: 2rem; border-bottom: 2px solid #eee; }
        .tab { padding: 0.75rem 1.5rem; cursor: pointer; border: none; background: none; font-size: 1rem; }
        .tab.active { color: #e67e22; border-bottom: 2px solid #e67e22; }
        .form-group { margin-bottom: 1rem; }
        input { width: 100%; padding: 0.75rem; border: 1px solid #ddd; border-radius: 8px; font-size: 1rem; }
        .btn-primary { width: 100%; background: #e67e22; color: white; border: none; padding: 0.75rem; border-radius: 8px; cursor: pointer; }
        .error { color: red; margin-top: 0.5rem; }
        .success { color: green; margin-top: 0.5rem; }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">Exam <span>System</span></div>
        <a href="index.html" class="btn-outline">Home</a>
    </div>
    <div class="container">
        <div class="card">
            <div class="tabs">
                <button class="tab active" onclick="switchTab('login')">Login</button>
                <button class="tab" onclick="switchTab('signup')">Sign Up</button>
            </div>
            <div id="loginForm">
                <div class="form-group"><input type="email" id="loginEmail" placeholder="Email"></div>
                <div class="form-group"><input type="password" id="loginPassword" placeholder="Password"></div>
                <button class="btn-primary" onclick="login()">Login</button>
                <div id="loginError" class="error"></div>
            </div>
            <div id="signupForm" style="display:none">
                <div class="form-group"><input type="text" id="signupName" placeholder="Full Name"></div>
                <div class="form-group"><input type="email" id="signupEmail" placeholder="Email"></div>
                <div class="form-group"><input type="password" id="signupPassword" placeholder="Password (min 4 chars)"></div>
                <button class="btn-primary" onclick="signup()">Create Account</button>
                <div id="signupError" class="error"></div>
                <div id="signupSuccess" class="success"></div>
            </div>
        </div>
    </div>

    <script>
        function switchTab(tab) {
            document.getElementById('loginForm').style.display = tab === 'login' ? 'block' : 'none';
            document.getElementById('signupForm').style.display = tab === 'signup' ? 'block' : 'none';
            document.querySelectorAll('.tab').forEach((t, i) => {
                t.classList.toggle('active', (tab === 'login' && i === 0) || (tab === 'signup' && i === 1));
            });
        }
        
        async function login() {
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            const errorDiv = document.getElementById('loginError');
            
            const res = await fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });
            
            const data = await res.json();
            
            if (data.success) {
                localStorage.setItem('exam_user', JSON.stringify(data.user));
                window.location.href = 'index.html';
            } else {
                errorDiv.innerText = data.error;
            }
        }
        
        async function signup() {
            const name = document.getElementById('signupName').value;
            const email = document.getElementById('signupEmail').value;
            const password = document.getElementById('signupPassword').value;
            const errorDiv = document.getElementById('signupError');
            const successDiv = document.getElementById('signupSuccess');
            
            errorDiv.innerText = '';
            successDiv.innerText = '';
            
            const res = await fetch('/api/signup', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, email, password })
            });
            
            const data = await res.json();
            
            if (data.success) {
                successDiv.innerText = 'Account created! Please login.';
                setTimeout(() => switchTab('login'), 2000);
            } else {
                errorDiv.innerText = data.error;
            }
        }
    </script>
</body>
</html>
