<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Take Exam</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: system-ui, sans-serif; background: #f0f2f5; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; }
        .header { background: #1a1a2e; color: white; padding: 1rem; border-radius: 12px; margin-bottom: 1rem; display: flex; justify-content: space-between; }
        .question-card { background: white; border-radius: 16px; padding: 1.5rem; margin-bottom: 1rem; }
        .option { display: block; padding: 12px; margin: 8px 0; background: #f8f9fa; border-radius: 8px; cursor: pointer; }
        .option.selected { background: #e67e22; color: white; }
        .btn { padding: 0.75rem 1.5rem; border-radius: 8px; border: none; cursor: pointer; }
        .btn-primary { background: #e67e22; color: white; }
        .timer { font-size: 1.5rem; font-weight: bold; color: #e67e22; }
        .result { text-align: center; padding: 2rem; }
        .score { font-size: 3rem; font-weight: bold; color: #e67e22; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <span id="examName">Loading...</span>
            <span id="timer" class="timer">--:--</span>
        </div>
        <div id="questions"></div>
        <button class="btn btn-primary" onclick="submitExam()" style="width:100%">Submit Exam</button>
    </div>

    <script>
        const user = JSON.parse(localStorage.getItem('exam_user'));
        const examId = localStorage.getItem('current_exam');
        
        if (!user || !examId) {
            window.location.href = 'index.html';
        }
        
        let questions = [];
        let answers = {};
        let timer = null;
        let timeLeft = 0;
        
        async function loadExam() {
            const res = await fetch(`/api/exam/${examId}`, {
                headers: { 'X-User-Data': JSON.stringify(user) }
            });
            const data = await res.json();
            
            if (data.error) {
                alert(data.error);
                window.location.href = 'index.html';
                return;
            }
            
            document.getElementById('examName').innerText = data.exam.name;
            questions = data.questions;
            timeLeft = data.exam.time_limit;
            startTimer();
            renderQuestions();
        }
        
        function renderQuestions() {
            const container = document.getElementById('questions');
            container.innerHTML = questions.map((q, idx) => `
                <div class="question-card">
                    <h3>Question ${idx + 1}: ${q.question_text}</h3>
                    ${q.image_url ? `<img src="${q.image_url}" style="max-width:100%; max-height:200px; margin:10px 0;">` : ''}
                    <div>
                        ${q.option_a ? `<div class="option ${answers[q.id] === 'a' ? 'selected' : ''}" onclick="selectOption(${q.id}, 'a')">A. ${q.option_a}</div>` : ''}
                        ${q.option_b ? `<div class="option ${answers[q.id] === 'b' ? 'selected' : ''}" onclick="selectOption(${q.id}, 'b')">B. ${q.option_b}</div>` : ''}
                        ${q.option_c ? `<div class="option ${answers[q.id] === 'c' ? 'selected' : ''}" onclick="selectOption(${q.id}, 'c')">C. ${q.option_c}</div>` : ''}
                        ${q.option_d ? `<div class="option ${answers[q.id] === 'd' ? 'selected' : ''}" onclick="selectOption(${q.id}, 'd')">D. ${q.option_d}</div>` : ''}
                    </div>
                </div>
            `).join('');
        }
        
        function selectOption(questionId, answer) {
            answers[questionId] = answer;
            renderQuestions();
        }
        
        function startTimer() {
            const timerDisplay = document.getElementById('timer');
            timer = setInterval(() => {
                if (timeLeft <= 0) {
                    clearInterval(timer);
                    submitExam();
                } else {
                    timeLeft--;
                    const minutes = Math.floor(timeLeft / 60);
                    const seconds = timeLeft % 60;
                    timerDisplay.innerText = `${minutes}:${seconds.toString().padStart(2, '0')}`;
                }
            }, 1000);
        }
        
        async function submitExam() {
            clearInterval(timer);
            
            const res = await fetch(`/api/exam/${examId}/submit`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ user_id: user.id, answers: answers })
            });
            
            const result = await res.json();
            
            document.getElementById('questions').innerHTML = `
                <div class="result">
                    <h2>Exam Completed!</h2>
                    <div class="score">${result.score}/${result.total}</div>
                    <p>Percentage: ${result.percentage.toFixed(1)}%</p>
                    <button class="btn btn-primary" onclick="location.href='index.html'">Back to Dashboard</button>
                </div>
            `;
            document.querySelector('button').style.display = 'none';
        }
        
        loadExam();
    </script>
</body>
</html>
