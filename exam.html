<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Take Exam</title>
    <style>
        body { font-family: system-ui; padding: 20px; max-width: 800px; margin: 0 auto; }
        .question { background: white; padding: 20px; margin: 10px 0; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .option { display: block; padding: 10px; margin: 5px 0; background: #f0f2f5; border-radius: 8px; cursor: pointer; }
        .option.selected { background: #e67e22; color: white; }
        button { background: #e67e22; color: white; padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; }
        .timer { font-size: 24px; font-weight: bold; color: #e67e22; text-align: center; margin: 20px; }
    </style>
</head>
<body>
    <h2 id="examName"></h2>
    <div class="timer" id="timer"></div>
    <div id="questions"></div>
    <button onclick="submitExam()">Submit Exam</button>

    <script>
        const user = JSON.parse(localStorage.getItem('user'));
        const examId = localStorage.getItem('exam_id');
        
        if (!user || !examId) window.location.href = 'index.html';
        
        let questions = [];
        let answers = {};
        let timeLeft = 0;
        let timerInterval;
        
        async function loadExam() {
            const res = await fetch(`/api/exam/${examId}`);
            const data = await res.json();
            
            document.getElementById('examName').innerText = data.exam.name;
            questions = data.questions;
            timeLeft = data.exam.time_limit;
            
            startTimer();
            renderQuestions();
        }
        
        function renderQuestions() {
            document.getElementById('questions').innerHTML = questions.map((q, idx) => `
                <div class="question">
                    <h4>${idx + 1}. ${q.question_text}</h4>
                    ${q.option_a ? `<div class="option ${answers[q.id] === 'a' ? 'selected' : ''}" onclick="selectOption(${q.id}, 'a')">A. ${q.option_a}</div>` : ''}
                    ${q.option_b ? `<div class="option ${answers[q.id] === 'b' ? 'selected' : ''}" onclick="selectOption(${q.id}, 'b')">B. ${q.option_b}</div>` : ''}
                    ${q.option_c ? `<div class="option ${answers[q.id] === 'c' ? 'selected' : ''}" onclick="selectOption(${q.id}, 'c')">C. ${q.option_c}</div>` : ''}
                    ${q.option_d ? `<div class="option ${answers[q.id] === 'd' ? 'selected' : ''}" onclick="selectOption(${q.id}, 'd')">D. ${q.option_d}</div>` : ''}
                </div>
            `).join('');
        }
        
        function selectOption(questionId, answer) {
            answers[questionId] = answer;
            renderQuestions();
        }
        
        function startTimer() {
            const timerDisplay = document.getElementById('timer');
            timerInterval = setInterval(() => {
                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    submitExam();
                } else {
                    timeLeft--;
                    const minutes = Math.floor(timeLeft / 60);
                    const seconds = timeLeft % 60;
                    timerDisplay.innerText = `${minutes}:${seconds.toString().padStart(2, '0')}`;
                }
            }, 1000);
        }
        
        async function submitExam() {
            clearInterval(timerInterval);
            
            const res = await fetch(`/api/exam/${examId}/submit`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ user_id: user.id, answers })
            });
            
            const result = await res.json();
            
            document.getElementById('questions').innerHTML = `
                <div style="text-align: center; padding: 40px;">
                    <h2>Your Score: ${result.score}/${result.total}</h2>
                    <p>Percentage: ${result.percentage.toFixed(1)}%</p>
                    <button onclick="location.href='index.html'">Back to Exams</button>
                </div>
            `;
            document.querySelector('button').style.display = 'none';
        }
        
        loadExam();
    </script>
</body>
</html>
