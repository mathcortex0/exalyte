<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Exalyte - Exam</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">

  <!-- Header with Timer -->
  <header class="flex items-center justify-between p-4 bg-white shadow-md sticky top-0 z-10">
    <h1 class="text-2xl font-bold text-gray-800">Exalyte Exam</h1>
    <div class="text-xl font-semibold text-red-600" id="timer">00:00</div>
  </header>

  <!-- Exam Questions -->
  <main class="p-6 max-w-4xl mx-auto">
    <form id="examForm" class="flex flex-col gap-6">
      <!-- Questions will be injected here dynamically -->
    </form>
    <div class="mt-6 flex justify-end">
      <button id="submitExam" class="bg-green-600 text-white px-6 py-3 rounded hover:bg-green-700">Submit Exam</button>
    </div>
  </main>

  <script src="js/exam.js"></script>
</body>
</html>
