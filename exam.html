<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Exam — ExamForge</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --surface2: #1c1c26;
    --border: #2a2a3a;
    --gold: #f0c040;
    --gold2: #ffd966;
    --text: #e8e8f0;
    --muted: #666680;
    --error: #ff5566;
    --success: #44cc88;
    --radius: 10px;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Instrument Sans',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }

  /* TOP BAR */
  .topbar {
    background:var(--surface);
    border-bottom:1px solid var(--border);
    padding:0 24px;
    height:60px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    position:sticky; top:0; z-index:50;
  }
  .exam-title-bar { font-family:'Syne',sans-serif; font-weight:700; font-size:1rem; }
  .timer-wrap { display:flex; align-items:center; gap:8px; }
  .timer {
    font-family:'Syne',sans-serif;
    font-size:1.4rem;
    font-weight:800;
    color:var(--gold);
    min-width:80px;
    text-align:center;
  }
  .timer.warning { color:var(--error); animation:pulse 1s infinite; }
  @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:.5; } }

  .progress-track {
    position:fixed;
    top:60px; left:0; right:0;
    height:3px;
    background:var(--border);
    z-index:49;
  }
  .progress-fill { height:100%; background:var(--gold); transition:width .3s; }

  /* LAYOUT */
  .layout { display:grid; grid-template-columns:280px 1fr; min-height:calc(100vh - 60px); }

  /* SIDEBAR */
  .sidebar {
    background:var(--surface);
    border-right:1px solid var(--border);
    padding:20px 16px;
    overflow-y:auto;
    height:calc(100vh - 63px);
    position:sticky;
    top:63px;
  }
  .sidebar-title { font-size:0.72rem; text-transform:uppercase; letter-spacing:.08em; color:var(--muted); font-weight:600; margin-bottom:12px; }
  .q-grid { display:grid; grid-template-columns:repeat(5,1fr); gap:6px; }
  .q-num {
    aspect-ratio:1;
    display:flex;
    align-items:center;
    justify-content:center;
    border-radius:6px;
    font-family:'Syne',sans-serif;
    font-size:0.78rem;
    font-weight:700;
    cursor:pointer;
    border:1.5px solid var(--border);
    background:var(--surface2);
    color:var(--muted);
    transition:all .15s;
  }
  .q-num.answered { background:rgba(68,204,136,0.15); border-color:rgba(68,204,136,0.4); color:var(--success); }
  .q-num.current { border-color:var(--gold); color:var(--gold); }
  .submit-wrap { margin-top:20px; padding-top:16px; border-top:1px solid var(--border); }
  .btn-submit {
    width:100%;
    padding:12px;
    background:var(--gold);
    color:#0a0a0f;
    border:none;
    border-radius:var(--radius);
    font-family:'Syne',sans-serif;
    font-size:0.88rem;
    font-weight:700;
    cursor:pointer;
    transition:all .2s;
  }
  .btn-submit:hover { background:var(--gold2); }
  .answered-count { font-size:0.8rem; color:var(--muted); text-align:center; margin-bottom:10px; }

  /* QUESTION AREA */
  .q-area { padding:32px 40px; overflow-y:auto; }
  .q-header { display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:24px; }
  .q-num-label { font-family:'Syne',sans-serif; font-size:0.75rem; text-transform:uppercase; letter-spacing:.08em; color:var(--muted); margin-bottom:8px; }
  .q-text { font-size:1.1rem; line-height:1.6; font-weight:500; max-width:680px; }
  .q-image { max-width:100%; max-height:280px; border-radius:var(--radius); margin:16px 0; object-fit:contain; border:1px solid var(--border); }

  .options { display:flex; flex-direction:column; gap:10px; margin-top:24px; max-width:680px; }
  .option {
    display:flex;
    align-items:flex-start;
    gap:14px;
    padding:14px 18px;
    background:var(--surface);
    border:1.5px solid var(--border);
    border-radius:var(--radius);
    cursor:pointer;
    transition:all .15s;
  }
  .option:hover { border-color:rgba(240,192,64,0.4); background:var(--surface2); }
  .option.selected { border-color:var(--gold); background:rgba(240,192,64,0.08); }
  .option-letter {
    width:28px; height:28px;
    border-radius:6px;
    background:var(--surface2);
    border:1px solid var(--border);
    display:flex; align-items:center; justify-content:center;
    font-family:'Syne',sans-serif;
    font-size:0.78rem;
    font-weight:700;
    color:var(--muted);
    flex-shrink:0;
    transition:all .15s;
  }
  .option.selected .option-letter { background:var(--gold); border-color:var(--gold); color:#0a0a0f; }
  .option-text { font-size:0.92rem; line-height:1.5; padding-top:3px; }

  /* NAV BTNS */
  .q-nav { display:flex; gap:10px; margin-top:28px; }
  .btn-nav {
    padding:10px 24px;
    border:1.5px solid var(--border);
    background:var(--surface);
    color:var(--text);
    border-radius:var(--radius);
    font-family:'Syne',sans-serif;
    font-size:0.85rem;
    font-weight:600;
    cursor:pointer;
    transition:all .2s;
  }
  .btn-nav:hover { border-color:var(--gold); color:var(--gold); }
  .btn-nav:disabled { opacity:.3; cursor:default; }
  .btn-next { background:var(--gold); color:#0a0a0f; border-color:var(--gold); }
  .btn-next:hover { background:var(--gold2); border-color:var(--gold2); color:#0a0a0f; }

  /* LOADING */
  .loading { display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:60vh; color:var(--muted); }
  .spinner { width:36px; height:36px; border:2px solid var(--border); border-top-color:var(--gold); border-radius:50%; animation:spin .7s linear infinite; margin-bottom:14px; }
  @keyframes spin { to { transform:rotate(360deg); } }

  /* CONFIRM OVERLAY */
  .overlay { position:fixed; inset:0; background:rgba(0,0,0,0.7); z-index:200; display:none; place-items:center; }
  .overlay.open { display:grid; }
  .dialog {
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:14px;
    padding:32px;
    max-width:380px;
    width:90%;
    text-align:center;
  }
  .dialog h3 { font-family:'Syne',sans-serif; font-size:1.2rem; font-weight:800; margin-bottom:10px; }
  .dialog p { color:var(--muted); font-size:0.88rem; margin-bottom:22px; }
  .dialog-btns { display:flex; gap:10px; justify-content:center; }
  .btn-confirm { padding:10px 24px; background:var(--gold); color:#0a0a0f; border:none; border-radius:var(--radius); font-family:'Syne',sans-serif; font-weight:700; cursor:pointer; }
  .btn-cancel { padding:10px 24px; background:transparent; border:1px solid var(--border); color:var(--muted); border-radius:var(--radius); font-family:'Syne',sans-serif; font-weight:600; cursor:pointer; }

  @media(max-width:768px) {
    .layout { grid-template-columns:1fr; }
    .sidebar { position:static; height:auto; border-right:none; border-bottom:1px solid var(--border); }
    .q-area { padding:20px 16px; }
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="exam-title-bar" id="examTitleBar">Loading exam...</div>
  <div class="timer-wrap">
    <span style="font-size:.75rem;color:var(--muted);text-transform:uppercase;letter-spacing:.06em">Time Left</span>
    <div class="timer" id="timerDisplay">--:--</div>
  </div>
</div>
<div class="progress-track"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>

<div id="mainContent">
  <div class="loading"><div class="spinner"></div>Loading questions...</div>
</div>

<!-- Confirm Submit Overlay -->
<div class="overlay" id="submitOverlay">
  <div class="dialog">
    <h3>Submit Exam?</h3>
    <p id="confirmMsg">You have answered 0 of 0 questions.</p>
    <div class="dialog-btns">
      <button class="btn-confirm" onclick="confirmSubmit()">Submit Now</button>
      <button class="btn-cancel" onclick="closeOverlay()">Continue</button>
    </div>
  </div>
</div>

<script>
const token = localStorage.getItem('token');
const user = JSON.parse(localStorage.getItem('user') || 'null');
if (!token || !user) { window.location.href = '/'; }

const examId = new URLSearchParams(location.search).get('id');
if (!examId) { window.location.href = '/dashboard.html'; }

let questions = [];
let exam = null;
let answers = {};
let currentQ = 0;
let timerInterval = null;
let timeLeft = 0;
let submitted = false;

async function loadExam() {
  try {
    const res = await fetch(`/api/exams/${examId}/questions`, { headers:{ Authorization:`Bearer ${token}` } });
    if (res.status === 401) { window.location.href='/'; return; }
    if (res.status === 403) { alert('You do not have access to this exam.'); window.location.href='/dashboard.html'; return; }
    const data = await res.json();
    if (data.error) { alert(data.error); window.location.href='/dashboard.html'; return; }

    exam = data.exam;
    questions = data.questions;
    document.title = `${exam.name} — ExamForge`;
    document.getElementById('examTitleBar').textContent = exam.name;

    timeLeft = exam.time_limit * 60;
    startTimer();
    renderLayout();
  } catch(e) {
    document.getElementById('mainContent').innerHTML = `<div class="loading">Failed to load exam.</div>`;
  }
}

function startTimer() {
  updateTimerDisplay();
  timerInterval = setInterval(() => {
    timeLeft--;
    updateTimerDisplay();
    if (timeLeft <= 0) { clearInterval(timerInterval); autoSubmit(); }
  }, 1000);
}

function updateTimerDisplay() {
  const m = Math.floor(timeLeft / 60);
  const s = timeLeft % 60;
  const display = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  const el = document.getElementById('timerDisplay');
  el.textContent = display;
  if (timeLeft <= 60) el.classList.add('warning');
  else el.classList.remove('warning');
}

function renderLayout() {
  document.getElementById('mainContent').innerHTML = `
    <div class="layout">
      <div class="sidebar">
        <div class="sidebar-title">Questions</div>
        <div class="q-grid" id="qGrid"></div>
        <div class="submit-wrap">
          <div class="answered-count" id="answeredCount">0 / ${questions.length} answered</div>
          <button class="btn-submit" onclick="openSubmitOverlay()">Submit Exam</button>
        </div>
      </div>
      <div class="q-area" id="qArea"></div>
    </div>`;

  renderQGrid();
  renderQuestion(0);
}

function renderQGrid() {
  const grid = document.getElementById('qGrid');
  grid.innerHTML = questions.map((q, i) => `
    <div class="q-num ${answers[q.id] ? 'answered' : ''} ${i === currentQ ? 'current' : ''}"
         onclick="goToQ(${i})">${i+1}</div>`).join('');

  const answered = Object.keys(answers).length;
  document.getElementById('answeredCount').textContent = `${answered} / ${questions.length} answered`;
  const pct = (currentQ + 1) / questions.length * 100;
  document.getElementById('progressFill').style.width = pct + '%';
}

function renderQuestion(idx) {
  currentQ = idx;
  const q = questions[idx];
  const selected = answers[q.id];

  const opts = [
    { key:'A', text: q.option_a },
    { key:'B', text: q.option_b },
    { key:'C', text: q.option_c },
    { key:'D', text: q.option_d },
  ];

  document.getElementById('qArea').innerHTML = `
    <div class="q-num-label">Question ${idx+1} of ${questions.length}</div>
    <div class="q-text">${esc(q.question_text)}</div>
    ${q.image_url ? `<img class="q-image" src="${q.image_url}" alt="Question image">` : ''}
    <div class="options">
      ${opts.map(o => `
        <div class="option ${selected === o.key ? 'selected' : ''}" onclick="selectAnswer('${q.id}','${o.key}')">
          <div class="option-letter">${o.key}</div>
          <div class="option-text">${esc(o.text)}</div>
        </div>`).join('')}
    </div>
    <div class="q-nav">
      <button class="btn-nav" onclick="goToQ(${idx-1})" ${idx===0 ? 'disabled' : ''}>← Prev</button>
      ${idx < questions.length-1
        ? `<button class="btn-nav btn-next" onclick="goToQ(${idx+1})">Next →</button>`
        : `<button class="btn-nav btn-next" onclick="openSubmitOverlay()">Submit →</button>`
      }
    </div>`;

  renderQGrid();
}

function selectAnswer(qId, key) {
  answers[qId] = key;
  renderQuestion(currentQ);
}

function goToQ(idx) {
  if (idx < 0 || idx >= questions.length) return;
  renderQuestion(idx);
}

function openSubmitOverlay() {
  const answered = Object.keys(answers).length;
  document.getElementById('confirmMsg').textContent = `You have answered ${answered} of ${questions.length} questions. Unanswered questions will be marked wrong.`;
  document.getElementById('submitOverlay').classList.add('open');
}

function closeOverlay() {
  document.getElementById('submitOverlay').classList.remove('open');
}

async function confirmSubmit() {
  closeOverlay();
  await submitExam();
}

async function autoSubmit() {
  if (submitted) return;
  alert('Time is up! Your exam has been submitted automatically.');
  await submitExam();
}

async function submitExam() {
  if (submitted) return;
  submitted = true;
  clearInterval(timerInterval);

  try {
    const res = await fetch(`/api/exams/${examId}/submit`, {
      method:'POST',
      headers:{ 'Content-Type':'application/json', Authorization:`Bearer ${token}` },
      body: JSON.stringify({ answers })
    });
    const data = await res.json();
    if (data.error) { alert(data.error); return; }
    window.location.href = `/result.html?attempt=${data.attemptId}&exam=${examId}`;
  } catch(e) {
    alert('Submission failed: ' + e.message);
    submitted = false;
  }
}

function esc(s) { const d=document.createElement('div'); d.textContent=String(s); return d.innerHTML; }

// Prevent accidental back navigation
window.addEventListener('beforeunload', e => {
  if (!submitted && questions.length > 0) { e.preventDefault(); e.returnValue=''; }
});

loadExam();
</script>
</body>
</html>
