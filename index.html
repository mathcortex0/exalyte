<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exams</title>
    <style>
        body { font-family: system-ui; padding: 20px; }
        .exam { background: #f0f2f5; padding: 20px; margin: 10px 0; border-radius: 10px; }
        button { background: #e67e22; color: white; padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>Available Exams</h1>
    <div id="exams"></div>

    <script>
        const user = JSON.parse(localStorage.getItem('user') || 'null');
        if (!user) window.location.href = 'login.html';
        
        async function loadExams() {
            const res = await fetch('/api/exams');
            const exams = await res.json();
            document.getElementById('exams').innerHTML = exams.map(e => `
                <div class="exam">
                    <h3>${e.name}</h3>
                    <button onclick="startExam(${e.id})">Start</button>
                </div>
            `).join('');
        }
        
        function startExam(id) {
            localStorage.setItem('exam_id', id);
            window.location.href = 'exam.html';
        }
        
        loadExams();
    </script>
</body>
</html>
