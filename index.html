<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exalyte - Premium Exam Platform</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-gradient-to-br from-gray-50 to-gray-100 min-h-screen">
    <div id="loadingOverlay" class="loading-overlay">
        <div class="bg-white rounded-lg p-8 text-center">
            <div class="spinner"></div>
            <p class="mt-4 text-gray-600">Loading...</p>
        </div>
    </div>
    
    <div class="container mx-auto px-4 py-12 max-w-md">
        <div class="bg-white rounded-2xl shadow-2xl overflow-hidden">
            <div class="bg-gradient-to-r from-blue-600 to-purple-600 p-8 text-white text-center">
                <img src="assets/logo.png" alt="Exalyte" class="h-20 mx-auto mb-4 bg-white rounded-full p-2" onerror="this.style.display='none'">
                <i class="fas fa-graduation-cap text-5xl mb-4"></i>
                <h1 class="text-3xl font-bold">Exalyte</h1>
                <p class="text-blue-100 mt-2">Premium Exam Platform</p>
            </div>
            <div class="p-8">
                <div class="flex gap-2 mb-6 border-b">
                    <button id="loginTab" class="flex-1 py-2 font-semibold border-b-2 border-blue-600 text-blue-600">Login</button>
                    <button id="signupTab" class="flex-1 py-2 font-semibold text-gray-500">Sign Up</button>
                </div>
                
                <div id="loginForm">
                    <div class="mb-4">
                        <label class="block text-gray-700 font-semibold mb-2">Email</label>
                        <input type="email" id="loginEmail" class="w-full px-4 py-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="your@email.com">
                    </div>
                    <div class="mb-6">
                        <label class="block text-gray-700 font-semibold mb-2">Password</label>
                        <input type="password" id="loginPassword" class="w-full px-4 py-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="••••••••">
                    </div>
                    <button id="loginBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-lg transition">Login</button>
                    <div class="relative my-6">
                        <div class="absolute inset-0 flex items-center"><div class="w-full border-t"></div></div>
                        <div class="relative flex justify-center text-sm"><span class="px-2 bg-white text-gray-500">Or</span></div>
                    </div>
                    <button id="googleBtn" class="w-full bg-white border py-3 rounded-lg hover:bg-gray-50 flex items-center justify-center gap-2">
                        <i class="fab fa-google text-red-500"></i>Sign in with Google
                    </button>
                </div>
                
                <div id="signupForm" class="hidden">
                    <div class="mb-4">
                        <label class="block text-gray-700 font-semibold mb-2">Full Name</label>
                        <input type="text" id="signupName" class="w-full px-4 py-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="John Doe">
                    </div>
                    <div class="mb-4">
                        <label class="block text-gray-700 font-semibold mb-2">Email</label>
                        <input type="email" id="signupEmail" class="w-full px-4 py-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="your@email.com">
                    </div>
                    <div class="mb-6">
                        <label class="block text-gray-700 font-semibold mb-2">Password</label>
                        <input type="password" id="signupPassword" class="w-full px-4 py-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="••••••••">
                    </div>
                    <button id="signupBtn" class="w-full bg-purple-600 hover:bg-purple-700 text-white font-bold py-3 rounded-lg transition">Create Account</button>
                </div>
            </div>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/auth.js"></script>
    <script>
        document.getElementById('loginTab').onclick = () => {
            document.getElementById('loginForm').classList.remove('hidden');
            document.getElementById('signupForm').classList.add('hidden');
            document.getElementById('loginTab').className = 'flex-1 py-2 font-semibold border-b-2 border-blue-600 text-blue-600';
            document.getElementById('signupTab').className = 'flex-1 py-2 font-semibold text-gray-500';
        };
        document.getElementById('signupTab').onclick = () => {
            document.getElementById('loginForm').classList.add('hidden');
            document.getElementById('signupForm').classList.remove('hidden');
            document.getElementById('signupTab').className = 'flex-1 py-2 font-semibold border-b-2 border-purple-600 text-purple-600';
            document.getElementById('loginTab').className = 'flex-1 py-2 font-semibold text-gray-500';
        };
        document.getElementById('loginBtn').onclick = () => login(document.getElementById('loginEmail').value, document.getElementById('loginPassword').value);
        document.getElementById('googleBtn').onclick = loginWithGoogle;
        document.getElementById('signupBtn').onclick = () => signup(document.getElementById('signupEmail').value, document.getElementById('signupPassword').value, document.getElementById('signupName').value);
        
        checkAuthAndRedirect();
    </script>
</body>
</html>
