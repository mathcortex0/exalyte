<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exalyte - Exam Platform</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .loading-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            z-index: 9999;
            display: none;
            align-items: center;
            justify-content: center;
        }
        .loading-overlay.active { display: flex; }
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 1000;
            animation: slideIn 0.3s;
        }
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        .option-btn {
            transition: all 0.2s;
            cursor: pointer;
        }
        .option-btn.selected {
            background-color: #dbeafe;
            border-color: #3b82f6;
            border-width: 2px;
        }
        .timer-warning {
            animation: pulse 1s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen">
    <div class="loading-overlay" id="loading">
        <div class="bg-white rounded-lg p-8 text-center">
            <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600 mx-auto"></div>
            <p class="mt-4 text-gray-600">Loading...</p>
        </div>
    </div>
    <div id="app" class="container mx-auto px-4 py-6 max-w-7xl"></div>

    <script>
        // Supabase config
        const SUPABASE_URL = 'https://pwprxidlohbzfsoxrnxs.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_hJTweaPJGWeaNPQxbBaEPw_jR0O9xhx';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        
        let currentUser = null;
        let currentProfile = null;
        let currentExam = null;
        let currentQuestions = [];
        let userAnswers = {};
        let timerInterval = null;
        let examStartTime = null;
        
        // Utilities
        function showLoading(show) {
            const el = document.getElementById('loading');
            if (show) el.classList.add('active');
            else el.classList.remove('active');
        }
        
        function showToast(msg, type = 'success') {
            const toast = document.createElement('div');
            toast.className = `toast ${type === 'success' ? 'bg-green-500' : 'bg-red-500'} text-white px-6 py-3 rounded-lg shadow-lg`;
            toast.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle'} mr-2"></i>${msg}`;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }
        
        function formatTime(seconds) {
            if (!seconds || seconds < 0) return '00:00';
            const mins = Math.floor(seconds / 60);
            const secs = seconds % 60;
            return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
        }
        
        function formatDate(date) {
            return new Date(date).toLocaleString();
        }
        
        // Auth functions
        async function checkAuth() {
            showLoading(true);
            const { data: { user } } = await supabase.auth.getUser();
            if (user) {
                currentUser = user;
                await loadProfile();
                loadDashboard();
            } else {
                showAuth();
            }
            showLoading(false);
        }
        
        async function loadProfile() {
            const { data } = await supabase.from('profiles').select('*').eq('id', currentUser.id).single();
            if (data) currentProfile = data;
            else {
                // Create profile if doesn't exist
                const { data: newProfile } = await supabase.from('profiles').insert({
                    id: currentUser.id,
                    email: currentUser.email,
                    full_name: currentUser.email.split('@')[0],
                    role: currentUser.email === 'alamin05052008@gmail.com' ? 'admin' : 'user'
                }).select().single();
                currentProfile = newProfile;
            }
        }
        
        async function login(email, password) {
            showLoading(true);
            const { error } = await supabase.auth.signInWithPassword({ email, password });
            showLoading(false);
            if (error) showToast(error.message, 'error');
            else { showToast('Login successful!'); checkAuth(); }
        }
        
        async function loginWithGoogle() {
            showLoading(true);
            const { error } = await supabase.auth.signInWithOAuth({
                provider: 'google',
                options: { redirectTo: window.location.origin }
            });
            showLoading(false);
            if (error) showToast(error.message, 'error');
        }
        
        async function signup(email, password, fullName) {
            showLoading(true);
            const { error } = await supabase.auth.signUp({
                email, password,
                options: { data: { full_name: fullName } }
            });
            showLoading(false);
            if (error) showToast(error.message, 'error');
            else showToast('Signup successful! Please verify your email.');
        }
        
        async function logout() {
            await supabase.auth.signOut();
            currentUser = null;
            currentProfile = null;
            showAuth();
            showToast('Logged out');
        }
        
        // Dashboard
        async function loadDashboard() {
            const isAdmin = currentProfile?.role === 'admin';
            const name = currentProfile?.full_name || currentUser.email.split('@')[0];
            
            const { data: exams } = await supabase
                .from('exams')
                .select('*')
                .gte('end_time', new Date().toISOString())
                .order('created_at', { ascending: false });
            
            const { data: completed } = await supabase
                .from('results')
                .select('exam_id')
                .eq('user_id', currentUser.id);
            
            const completedIds = new Set(completed?.map(c => c.exam_id) || []);
            
            const app = document.getElementById('app');
            app.innerHTML = `
                <div class="bg-white rounded-xl shadow-lg p-6 mb-6">
                    <div class="flex flex-wrap justify-between items-center gap-4">
                        <div>
                            <h1 class="text-2xl font-bold">Welcome, ${name}!</h1>
                            <p class="text-gray-600">Test your knowledge with our exams</p>
                        </div>
                        <div class="flex gap-3">
                            <button id="leaderboardBtn" class="px-4 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700">
                                <i class="fas fa-trophy mr-2"></i>Leaderboard
                            </button>
                            ${isAdmin ? `
                                <button id="adminBtn" class="px-4 py-2 bg-purple-600 text-white rounded-lg hover:bg-purple-700">
                                    <i class="fas fa-cog mr-2"></i>Admin
                                </button>
                            ` : ''}
                            <button id="historyBtn" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700">
                                <i class="fas fa-history mr-2"></i>History
                            </button>
                            <button id="logoutBtn" class="px-4 py-2 bg-red-600 text-white rounded-lg hover:bg-red-700">
                                <i class="fas fa-sign-out-alt mr-2"></i>Logout
                            </button>
                        </div>
                    </div>
                </div>
                
                <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-6">
                    ${exams?.length ? exams.map(exam => `
                        <div class="bg-white rounded-xl shadow-md p-5 hover:shadow-lg transition">
                            <div class="flex justify-between items-start mb-3">
                                <h3 class="text-lg font-bold">${exam.title}</h3>
                                ${exam.is_paid ? '<span class="bg-yellow-100 text-yellow-800 text-xs px-2 py-1 rounded-full"><i class="fas fa-crown"></i> Premium</span>' : '<span class="bg-green-100 text-green-800 text-xs px-2 py-1 rounded-full">Free</span>'}
                            </div>
                            <p class="text-gray-600 text-sm mb-3">${exam.description || 'No description'}</p>
                            <div class="text-sm text-gray-500 space-y-1">
                                <div><i class="fas fa-clock mr-2"></i>${exam.duration} minutes</div>
                                <div><i class="fas fa-calendar mr-2"></i>${formatDate(exam.start_time)}</div>
                            </div>
                            ${completedIds.has(exam.id) ? 
                                '<div class="mt-4 text-green-600"><i class="fas fa-check-circle"></i> Completed</div>' :
                                `<button onclick="startExam('${exam.id}')" class="mt-4 w-full bg-blue-600 text-white py-2 rounded-lg hover:bg-blue-700">Start Exam</button>`
                            }
                        </div>
                    `).join('') : '<div class="col-span-full text-center py-8 text-gray-500">No exams available</div>'}
                </div>
            `;
            
            document.getElementById('leaderboardBtn')?.addEventListener('click', showLeaderboard);
            document.getElementById('adminBtn')?.addEventListener('click', showAdminPanel);
            document.getElementById('historyBtn')?.addEventListener('click', showHistory);
            document.getElementById('logoutBtn')?.addEventListener('click', logout);
        }
        
        // Start exam
        window.startExam = async (examId) => {
            showLoading(true);
            
            const { data: existing } = await supabase
                .from('results')
                .select('id')
                .eq('user_id', currentUser.id)
                .eq('exam_id', examId)
                .single();
            
            if (existing) {
                showToast('You have already taken this exam!', 'error');
                showLoading(false);
                return;
            }
            
            const { data: exam } = await supabase
                .from('exams')
                .select('*')
                .eq('id', examId)
                .single();
            
            if (!exam) {
                showToast('Exam not found', 'error');
                showLoading(false);
                return;
            }
            
            if (exam.is_paid) {
                const { data: paid } = await supabase
                    .from('paid_users')
                    .select('*')
                    .eq('user_id', currentUser.id)
                    .eq('exam_id', examId)
                    .single();
                
                if (!paid) {
                    showToast('Premium exam - upgrade required', 'error');
                    showLoading(false);
                    return;
                }
            }
            
            const now = new Date();
            if (now < new Date(exam.start_time)) {
                showToast(`Exam starts on ${formatDate(exam.start_time)}`, 'error');
                showLoading(false);
                return;
            }
            if (now > new Date(exam.end_time)) {
                showToast('Exam has ended', 'error');
                showLoading(false);
                return;
            }
            
            let { data: questions } = await supabase
                .from('questions')
                .select('*')
                .eq('exam_id', examId);
            
            if (!questions?.length) {
                showToast('No questions available', 'error');
                showLoading(false);
                return;
            }
            
            questions = questions.sort(() => Math.random() - 0.5);
            if (exam.total_questions_to_show && exam.total_questions_to_show < questions.length) {
                questions = questions.slice(0, exam.total_questions_to_show);
            }
            
            currentExam = exam;
            currentQuestions = questions;
            userAnswers = {};
            examStartTime = new Date();
            
            showLoading(false);
            renderExam();
            startTimer(exam.duration * 60);
        };
        
        function startTimer(duration) {
            if (timerInterval) clearInterval(timerInterval);
            let timeLeft = duration;
            
            timerInterval = setInterval(() => {
                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    submitExam();
                } else {
                    timeLeft--;
                    const timerEl = document.getElementById('timer');
                    if (timerEl) {
                        timerEl.textContent = formatTime(timeLeft);
                        if (timeLeft < 300) timerEl.classList.add('timer-warning', 'text-red-600');
                    }
                }
            }, 1000);
        }
        
        function renderExam() {
            const app = document.getElementById('app');
            app.innerHTML = `
                <div class="sticky top-0 bg-white shadow-lg rounded-lg mb-6 p-4 z-10">
                    <div class="flex justify-between items-center">
                        <div>
                            <h2 class="text-xl font-bold">${currentExam.title}</h2>
                            <p class="text-sm text-gray-600">${currentExam.description || ''}</p>
                        </div>
                        <div class="text-right">
                            <div class="text-sm text-gray-600">Time Remaining</div>
                            <div id="timer" class="text-3xl font-mono font-bold text-blue-600">${formatTime(currentExam.duration * 60)}</div>
                        </div>
                    </div>
                </div>
                
                <div class="space-y-4 mb-24">
                    ${currentQuestions.map((q, idx) => `
                        <div class="bg-white rounded-xl shadow-md p-6" data-qid="${q.id}">
                            <div class="mb-4">
                                <h3 class="font-semibold">Question ${idx + 1}</h3>
                                <p class="mt-2">${q.question_text}</p>
                                ${q.image_url ? `<img src="${q.image_url}" class="mt-3 max-w-full rounded-lg max-h-48">` : ''}
                            </div>
                            <div class="space-y-2">
                                ${['a', 'b', 'c', 'd'].map(opt => `
                                    <button class="option-btn w-full text-left p-3 rounded-lg border border-gray-300 hover:bg-gray-50" data-opt="${opt}">
                                        <span class="font-semibold inline-block w-8">${opt.toUpperCase()}.</span>
                                        ${q[`option_${opt}`]}
                                    </button>
                                `).join('')}
                            </div>
                        </div>
                    `).join('')}
                </div>
                
                <div class="fixed bottom-0 left-0 right-0 bg-white border-t shadow-lg p-4">
                    <div class="container mx-auto max-w-7xl flex justify-between items-center">
                        <div class="text-sm text-gray-600">
                            Answered: <span id="answered">0</span> / ${currentQuestions.length}
                        </div>
                        <button id="submitBtn" class="px-6 py-3 bg-green-600 text-white font-bold rounded-lg hover:bg-green-700">
                            <i class="fas fa-check-circle mr-2"></i>Submit Exam
                        </button>
                    </div>
                </div>
            `;
            
            document.querySelectorAll('.option-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const card = btn.closest('[data-qid]');
                    const qid = card.dataset.qid;
                    const opt = btn.dataset.opt;
                    userAnswers[qid] = opt;
                    
                    card.querySelectorAll('.option-btn').forEach(ob => {
                        ob.classList.remove('selected', 'bg-blue-100', 'border-blue-500');
                        if (ob.dataset.opt === opt) {
                            ob.classList.add('selected', 'bg-blue-100', 'border-blue-500');
                        }
                    });
                    
                    document.getElementById('answered').textContent = Object.keys(userAnswers).length;
                });
            });
            
            document.getElementById('submitBtn').addEventListener('click', () => {
                if (confirm('Submit exam?')) submitExam();
            });
        }
        
        async function submitExam() {
            if (timerInterval) clearInterval(timerInterval);
            showLoading(true);
            
            const timeTaken = Math.floor((new Date() - examStartTime) / 1000);
            let correct = 0, wrong = 0, skipped = 0;
            
            currentQuestions.forEach(q => {
                const answer = userAnswers[q.id];
                if (!answer) skipped++;
                else if (answer === q.correct_answer) correct++;
                else wrong++;
            });
            
            const total = currentQuestions.length;
            const percentage = (correct / total * 100).toFixed(2);
            const score = (correct * currentExam.marks_per_question) + (wrong * currentExam.negative_mark_per_wrong);
            
            const { error } = await supabase.from('results').insert({
                user_id: currentUser.id,
                exam_id: currentExam.id,
                score: score,
                correct_count: correct,
                wrong_count: wrong,
                time_taken: timeTaken,
                answers: userAnswers
            });
            
            showLoading(false);
            
            if (error) {
                showToast('Error: ' + error.message, 'error');
                loadDashboard();
                return;
            }
            
            const app = document.getElementById('app');
            app.innerHTML = `
                <div class="max-w-2xl mx-auto">
                    <div class="bg-white rounded-xl shadow-xl overflow-hidden">
                        <div class="bg-gradient-to-r from-green-500 to-blue-600 p-8 text-white text-center">
                            <i class="fas fa-check-circle text-6xl mb-4"></i>
                            <h1 class="text-3xl font-bold">Exam Completed!</h1>
                        </div>
                        <div class="p-8">
                            <div class="grid grid-cols-2 gap-4 mb-6">
                                <div class="text-center p-4 bg-gray-50 rounded">
                                    <div class="text-3xl font-bold text-blue-600">${score}</div>
                                    <div class="text-sm">Score</div>
                                </div>
                                <div class="text-center p-4 bg-gray-50 rounded">
                                    <div class="text-3xl font-bold text-green-600">${percentage}%</div>
                                    <div class="text-sm">Percentage</div>
                                </div>
                            </div>
                            <div class="space-y-3 mb-6">
                                <div class="flex justify-between p-3 bg-green-50 rounded"><span>✅ Correct</span><span class="font-bold">${correct}</span></div>
                                <div class="flex justify-between p-3 bg-red-50 rounded"><span>❌ Wrong</span><span class="font-bold">${wrong}</span></div>
                                <div class="flex justify-between p-3 bg-yellow-50 rounded"><span>⏭️ Skipped</span><span class="font-bold">${skipped}</span></div>
                                <div class="flex justify-between p-3 bg-gray-50 rounded"><span>⏱️ Time Taken</span><span class="font-bold">${formatTime(timeTaken)}</span></div>
                            </div>
                            <button onclick="loadDashboard()" class="w-full bg-blue-600 text-white py-3 rounded-lg">Back to Dashboard</button>
                        </div>
                    </div>
                </div>
            `;
        }
        
        // Leaderboard
        async function showLeaderboard() {
            showLoading(true);
            const { data } = await supabase
                .from('results')
                .select('*, profiles(full_name, email), exams(title)')
                .order('score', { ascending: false })
                .limit(50);
            showLoading(false);
            
            const app = document.getElementById('app');
            app.innerHTML = `
                <div class="bg-white rounded-xl shadow-lg p-6">
                    <div class="flex justify-between items-center mb-6">
                        <h1 class="text-2xl font-bold">🏆 Leaderboard</h1>
                        <button onclick="loadDashboard()" class="px-4 py-2 bg-gray-600 text-white rounded-lg">Back</button>
                    </div>
                    ${data?.length ? `
                        <div class="overflow-x-auto">
                            <table class="w-full">
                                <thead class="bg-gray-100">
                                    <tr><th class="p-3">Rank</th><th class="p-3">Student</th><th class="p-3">Exam</th><th class="p-3">Score</th></tr>
                                </thead>
                                <tbody>
                                    ${data.map((r, i) => `
                                        <tr class="border-b">
                                            <td class="p-3 font-semibold">${i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : i+1}</td>
                                            <td class="p-3">${r.profiles?.full_name || r.profiles?.email?.split('@')[0]}</td>
                                            <td class="p-3">${r.exams?.title}</td>
                                            <td class="p-3 font-bold text-blue-600">${r.score}</td>
                                        </tr>
                                    `).join('')}
                                </tbody>
                            </table>
                        </div>
                    ` : '<div class="text-center py-8">No results yet</div>'}
                </div>
            `;
        }
        
        // History
        async function showHistory() {
            showLoading(true);
            const { data } = await supabase
                .from('results')
                .select('*, exams(title)')
                .eq('user_id', currentUser.id)
                .order('created_at', { ascending: false });
            showLoading(false);
            
            const app = document.getElementById('app');
            app.innerHTML = `
                <div class="bg-white rounded-xl shadow-lg p-6">
                    <div class="flex justify-between items-center mb-6">
                        <h1 class="text-2xl font-bold">📚 My History</h1>
                        <button onclick="loadDashboard()" class="px-4 py-2 bg-gray-600 text-white rounded-lg">Back</button>
                    </div>
                    ${data?.length ? data.map(r => `
                        <div class="border rounded-lg p-4 mb-3">
                            <div class="flex justify-between">
                                <div><h3 class="font-bold">${r.exams?.title}</h3><p class="text-sm text-gray-500">${formatDate(r.created_at)}</p></div>
                                <div class="text-right"><span class="text-2xl font-bold text-blue-600">${r.score}</span><p class="text-sm">${r.correct_count} correct / ${r.wrong_count} wrong</p></div>
                            </div>
                            <div class="text-sm text-gray-500 mt-2">⏱️ ${formatTime(r.time_taken)}</div>
                        </div>
                    `).join('') : '<div class="text-center py-8">No history yet</div>'}
                </div>
            `;
        }
        
        // Admin Panel
        async function showAdminPanel() {
            if (currentProfile?.role !== 'admin') {
                showToast('Unauthorized', 'error');
                loadDashboard();
                return;
            }
            
            const { data: exams } = await supabase.from('exams').select('*');
            
            const app = document.getElementById('app');
            app.innerHTML = `
                <div class="bg-white rounded-xl shadow-lg p-6">
                    <div class="flex justify-between items-center mb-6">
                        <h1 class="text-2xl font-bold">⚙️ Admin Panel</h1>
                        <button onclick="loadDashboard()" class="px-4 py-2 bg-gray-600 text-white rounded-lg">Back</button>
                    </div>
                    
                    <div class="grid md:grid-cols-2 gap-6">
                        <div class="border rounded-lg p-4">
                            <h2 class="text-xl font-bold mb-4">Create Exam</h2>
                            <form id="createExamForm" class="space-y-3">
                                <input type="text" id="title" placeholder="Title" class="w-full p-2 border rounded" required>
                                <textarea id="desc" placeholder="Description" class="w-full p-2 border rounded" rows="2"></textarea>
                                <input type="datetime-local" id="start" class="w-full p-2 border rounded" required>
                                <input type="datetime-local" id="end" class="w-full p-2 border rounded" required>
                                <input type="number" id="duration" placeholder="Duration (minutes)" class="w-full p-2 border rounded" required>
                                <input type="number" id="marks" placeholder="Marks per question" step="0.01" class="w-full p-2 border rounded" required>
                                <input type="number" id="negative" placeholder="Negative marking" step="0.01" class="w-full p-2 border rounded">
                                <label class="flex items-center"><input type="checkbox" id="isPaid" class="mr-2"> Paid Exam</label>
                                <button type="submit" class="w-full bg-blue-600 text-white py-2 rounded">Create Exam</button>
                            </form>
                        </div>
                        
                        <div class="border rounded-lg p-4">
                            <h2 class="text-xl font-bold mb-4">Bulk Upload Questions</h2>
                            <select id="examSelect" class="w-full p-2 border rounded mb-3">
                                <option value="">Select Exam</option>
                                ${exams?.map(e => `<option value="${e.id}">${e.title}</option>`).join('')}
                            </select>
                            <textarea id="questionsJson" placeholder='[{"question":"What is 2+2?","a":"3","b":"4","c":"5","d":"6","correct":"b"}]' class="w-full p-2 border rounded" rows="6"></textarea>
                            <button id="uploadBtn" class="mt-3 w-full bg-green-600 text-white py-2 rounded">Upload Questions</button>
                        </div>
                        
                        <div class="border rounded-lg p-4">
                            <h2 class="text-xl font-bold mb-4">Paid Users</h2>
                            <select id="paidExamSelect" class="w-full p-2 border rounded mb-3">
                                <option value="">Select Exam</option>
                                ${exams?.map(e => `<option value="${e.id}">${e.title}</option>`).join('')}
                            </select>
                            <div class="flex gap-2 mb-3">
                                <input type="email" id="userEmail" placeholder="User Email" class="flex-1 p-2 border rounded">
                                <button id="addPaidUser" class="bg-blue-600 text-white px-4 py-2 rounded">Add</button>
                            </div>
                            <div id="paidUsersList" class="space-y-2 max-h-48 overflow-y-auto"></div>
                        </div>
                    </div>
                </div>
            `;
            
            document.getElementById('createExamForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                const { error } = await supabase.from('exams').insert({
                    title: document.getElementById('title').value,
                    description: document.getElementById('desc').value,
                    start_time: document.getElementById('start').value,
                    end_time: document.getElementById('end').value,
                    duration: parseInt(document.getElementById('duration').value),
                    marks_per_question: parseFloat(document.getElementById('marks').value),
                    negative_mark_per_wrong: parseFloat(document.getElementById('negative').value) || 0,
                    is_paid: document.getElementById('isPaid').checked
                });
                if (error) showToast('Error: ' + error.message, 'error');
                else { showToast('Exam created!'); showAdminPanel(); }
            });
            
            document.getElementById('uploadBtn').addEventListener('click', async () => {
                const examId = document.getElementById('examSelect').value;
                if (!examId) { showToast('Select exam', 'error'); return; }
                try {
                    const questions = JSON.parse(document.getElementById('questionsJson').value);
                    const toInsert = questions.map(q => ({
                        exam_id: examId,
                        question_text: q.question,
                        option_a: q.a,
                        option_b: q.b,
                        option_c: q.c,
                        option_d: q.d,
                        correct_answer: q.correct,
                        image_url: q.image_url || null
                    }));
                    const { error } = await supabase.from('questions').insert(toInsert);
                    if (error) throw error;
                    showToast(`Uploaded ${questions.length} questions!`);
                } catch (err) {
                    showToast('Invalid JSON: ' + err.message, 'error');
                }
            });
            
            document.getElementById('addPaidUser').addEventListener('click', async () => {
                const examId = document.getElementById('paidExamSelect').value;
                const email = document.getElementById('userEmail').value;
                if (!examId || !email) { showToast('Select exam and email', 'error'); return; }
                
                const { data: user } = await supabase.from('profiles').select('id').eq('email', email).single();
                if (!user) { showToast('User not found', 'error'); return; }
                
                const { error } = await supabase.from('paid_users').insert({ user_id: user.id, exam_id: examId });
                if (error) showToast('Error: ' + error.message, 'error');
                else { showToast('User added!'); loadPaidUsers(examId); }
            });
            
            document.getElementById('paidExamSelect').addEventListener('change', (e) => {
                if (e.target.value) loadPaidUsers(e.target.value);
            });
        }
        
        async function loadPaidUsers(examId) {
            const { data } = await supabase
                .from('paid_users')
                .select('user_id, profiles(email)')
                .eq('exam_id', examId);
            
            const container = document.getElementById('paidUsersList');
            if (!data?.length) {
                container.innerHTML = '<p class="text-gray-500 text-center py-4">No paid users</p>';
                return;
            }
            container.innerHTML = data.map(p => `
                <div class="flex justify-between items-center p-2 bg-gray-50 rounded">
                    <span>${p.profiles?.email}</span>
                    <button onclick="removePaidUser('${p.user_id}', '${examId}')" class="text-red-600">❌</button>
                </div>
            `).join('');
        }
        
        window.removePaidUser = async (userId, examId) => {
            await supabase.from('paid_users').delete().eq('user_id', userId).eq('exam_id', examId);
            loadPaidUsers(examId);
        };
        
        // Auth UI
        function showAuth() {
            const app = document.getElementById('app');
            app.innerHTML = `
                <div class="max-w-md mx-auto bg-white rounded-2xl shadow-2xl overflow-hidden">
                    <div class="bg-gradient-to-r from-blue-600 to-purple-600 p-8 text-white text-center">
                        <i class="fas fa-graduation-cap text-5xl mb-4"></i>
                        <h1 class="text-3xl font-bold">Exalyte</h1>
                        <p class="text-blue-100 mt-2">Premium Exam Platform</p>
                    </div>
                    <div class="p-8">
                        <div class="flex gap-2 mb-6 border-b">
                            <button id="loginTab" class="flex-1 py-2 font-semibold border-b-2 border-blue-600 text-blue-600">Login</button>
                            <button id="signupTab" class="flex-1 py-2 font-semibold text-gray-500">Sign Up</button>
                        </div>
                        
                        <div id="loginForm">
                            <input type="email" id="loginEmail" placeholder="Email" class="w-full p-3 border rounded-lg mb-3">
                            <input type="password" id="loginPassword" placeholder="Password" class="w-full p-3 border rounded-lg mb-4">
                            <button id="loginBtn" class="w-full bg-blue-600 text-white py-3 rounded-lg hover:bg-blue-700">Login</button>
                            <div class="relative my-6"><div class="absolute inset-0 flex items-center"><div class="w-full border-t"></div></div><div class="relative flex justify-center text-sm"><span class="px-2 bg-white text-gray-500">Or</span></div></div>
                            <button id="googleBtn" class="w-full bg-white border py-3 rounded-lg hover:bg-gray-50 flex items-center justify-center gap-2"><i class="fab fa-google text-red-500"></i>Sign in with Google</button>
                        </div>
                        
                        <div id="signupForm" class="hidden">
                            <input type="text" id="signupName" placeholder="Full Name" class="w-full p-3 border rounded-lg mb-3">
                            <input type="email" id="signupEmail" placeholder="Email" class="w-full p-3 border rounded-lg mb-3">
                            <input type="password" id="signupPassword" placeholder="Password" class="w-full p-3 border rounded-lg mb-4">
                            <button id="signupBtn" class="w-full bg-purple-600 text-white py-3 rounded-lg hover:bg-purple-700">Create Account</button>
                        </div>
                    </div>
                </div>
            `;
            
            document.getElementById('loginTab').onclick = () => {
                document.getElementById('loginForm').classList.remove('hidden');
                document.getElementById('signupForm').classList.add('hidden');
                document.getElementById('loginTab').className = 'flex-1 py-2 font-semibold border-b-2 border-blue-600 text-blue-600';
                document.getElementById('signupTab').className = 'flex-1 py-2 font-semibold text-gray-500';
            };
            document.getElementById('signupTab').onclick = () => {
                document.getElementById('loginForm').classList.add('hidden');
                document.getElementById('signupForm').classList.remove('hidden');
                document.getElementById('signupTab').className = 'flex-1 py-2 font-semibold border-b-2 border-purple-600 text-purple-600';
                document.getElementById('loginTab').className = 'flex-1 py-2 font-semibold text-gray-500';
            };
            document.getElementById('loginBtn').onclick = () => login(document.getElementById('loginEmail').value, document.getElementById('loginPassword').value);
            document.getElementById('googleBtn').onclick = loginWithGoogle;
            document.getElementById('signupBtn').onclick = () => signup(document.getElementById('signupEmail').value, document.getElementById('signupPassword').value, document.getElementById('signupName').value);
        }
        
        // Start
        checkAuth();
    </script>
</body>
</html>
