<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Exalyte - Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen">

  <div class="w-full max-w-md p-8 bg-white rounded-xl shadow-lg">
    <div class="flex flex-col items-center mb-6">
      <img src="assets/logo.png" alt="Exalyte Logo" class="h-16 mb-4">
      <h1 class="text-3xl font-bold text-gray-800">Exalyte</h1>
      <p class="text-gray-500 mt-1">Your Exam Platform</p>
    </div>

    <form id="loginForm" class="flex flex-col gap-4">
      <input type="email" id="email" placeholder="Email" class="border p-2 rounded">
      <input type="password" id="password" placeholder="Password" class="border p-2 rounded">
      <button type="submit" class="bg-blue-600 text-white p-2 rounded hover:bg-blue-700">Login</button>
    </form>

    <p class="mt-4 text-gray-500 text-sm text-center">
      Don't have an account? <a href="#" class="text-blue-600">Sign Up</a>
    </p>
  </div>

  <script src="js/auth.js"></script>
</body>
</html>
